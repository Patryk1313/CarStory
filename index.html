<!doctype html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Info Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-shell">
        <main class="app">
            <section class="hero" aria-label="Informacje o pojezdzie">
                <div class="hero__content">
                    <h1 id="car-name" class="hero__title"></h1>
                    <div class="hero__chips">
                        <span id="car-year" class="chip"></span>
                        <span id="car-engine" class="chip"></span>
                    </div>
                </div>
                <button class="icon-button" type="button" aria-label="Ustawienia" data-placeholder="Ustawienia beda dostepne pozniej">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.03 7.03 0 0 0-1.63-.94l-.36-2.54A.5.5 0 0 0 13.9 1h-3.8a.5.5 0 0 0-.49.42l-.36 2.54a7.03 7.03 0 0 0-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L3.51 7.48a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32c.13.22.39.31.6.22l2.39-.96c.5.39 1.04.71 1.63.94l.36 2.54c.04.24.25.42.49.42h3.8c.24 0 .45-.18.49-.42l.36-2.54c.59-.23 1.13-.55 1.63-.94l2.39.96c.22.09.47 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58ZM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7Z" />
                    </svg>
                </button>
            </section>

            <section id="status-grid" class="status-grid" aria-label="Statusy serwisowe"></section>

            <section class="quick-actions" aria-label="Szybkie akcje">
                <button class="quick-action" type="button" data-placeholder="Dodawanie wpisow bedzie dostepne pozniej">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 5v14M5 12h14" />
                    </svg>
                    <span>Dodaj wpis</span>
                </button>
                <button class="quick-action" type="button" data-placeholder="Sekcja faktur jest w przygotowaniu">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M8 3.5h7l4 4V20a1 1 0 0 1-1 1H8a1 1 0 0 1-1-1V4.5a1 1 0 0 1 1-1Z" />
                        <path d="M15 3.5V8h4" />
                        <path d="M9.5 12h5M9.5 15.5h5M9.5 19h3.5" />
                    </svg>
                    <span>Faktury</span>
                </button>
                <button class="quick-action" type="button" data-placeholder="Analizy beda dostepne pozniej">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M4 18.5h16" />
                        <path d="M7 15l3-3 3 2 4-5" />
                        <path d="M17 9h2v2" />
                    </svg>
                    <span>Analizy</span>
                </button>
            </section>

            <section class="history-card" aria-labelledby="history-title">
                <header class="section-header">
                    <h2 id="history-title">Historia serwisowa</h2>
                    <button class="text-button" type="button" data-placeholder="Pelna historia bedzie dostepna pozniej">Zobacz wszystko</button>
                </header>
                <ol id="timeline" class="timeline"></ol>
            </section>
        </main>

        <nav class="bottom-nav" aria-label="Dolna nawigacja">
            <button class="nav-item nav-item--active" type="button" aria-current="page">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M5 15.5V12a2 2 0 0 1 .64-1.47l2.93-2.76A3 3 0 0 1 10.64 7h2.72a3 3 0 0 1 2.07.77l2.93 2.76A2 2 0 0 1 19 12v3.5" />
                    <path d="M7 15.5h10a1.5 1.5 0 0 1 1.5 1.5v.5H5.5V17A1.5 1.5 0 0 1 7 15.5Z" />
                    <circle cx="8" cy="18.25" r="1.25" />
                    <circle cx="16" cy="18.25" r="1.25" />
                </svg>
                <span>Pojazd</span>
            </button>
            <button class="nav-item" type="button" data-placeholder="Historia rozszerzona jest w przygotowaniu">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 8v5l3 2" />
                    <path d="M3 12a9 9 0 1 0 3-6.71" />
                    <path d="M3 4v4h4" />
                </svg>
                <span>Historia</span>
            </button>
            <button class="nav-item" type="button" data-placeholder="Sekcja czesci jest w przygotowaniu">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="m14.5 6.5 3 3" />
                    <path d="M8.5 17.5a3 3 0 0 1 0-4.24l6.26-6.26a3 3 0 1 1 4.24 4.24l-6.26 6.26a3 3 0 0 1-4.24 0Z" />
                    <path d="M6 21l3.25-3.25" />
                    <path d="m3 18 3 3" />
                </svg>
                <span>Części</span>
            </button>
            <button class="nav-item" type="button" data-placeholder="Profil jest w przygotowaniu">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 13a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" />
                    <path d="M5 20a7 7 0 0 1 14 0" />
                </svg>
                <span>Profil</span>
            </button>
        </nav>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
